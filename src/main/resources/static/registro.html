<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de usuario</title>
</head>
<body>
    <h2>Crear cuenta</h2>
    <form id="registroForm">
        <input type="text" id="nombre" placeholder="Nombre completo" required><br><br>
        <input type="email" id="email" placeholder="Correo electrónico" required><br><br>
        <input type="password" id="password" placeholder="Contraseña" required><br><br>
        <select id="rol" required>
            <option value="">Selecciona un rol</option>
            <option value="ALUMNO">Alumno</option>
            <option value="DOCENTE">Docente</option>
            <option value="ADMIN">Administrador</option>
        </select><br><br>
        <button type="submit">Registrarse</button>
    </form>
    <p id="mensajeError" style="color:red"></p>
    <p id="mensajeExito" style="color:green"></p>
    <a href="login.html">← Volver al inicio de sesión</a>

    <script src="/js/api.js"></script>
    <script src="/js/registro.js"></script>
</body>
</html>
